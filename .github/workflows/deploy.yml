name: Deploy to GitHub Pages

on:
  schedule:
    - cron: "0 3 * * *" # Сборка каждую ночь в 03:00 UTC (база всегда свежая)
  push:
    branches: [main] # Сборка при каждом пуше в ветку main
  workflow_dispatch: # Кнопка для ручного запуска в интерфейсе GitHub

# Разрешения для работы с GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        # Передаем секрет из настроек репозитория в переменную окружения
        env:
          KINOPOISK_API_KEY: ${{ secrets.KINOPOISK_API_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
